<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Products</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Product Catalog (Database-Backend)</h1>
    <div id="product-grid">Loading products...</div>

    <script>
        const API_BASE = 'http://localhost:8080/api/v1/products';

        async function fetchProducts() {
            const grid = document.getElementById('product-grid');
            try {
                const response = await fetch(API_BASE);
                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }
                const products = await response.json();
                console.log('Fetched products:', products);

                if (products.length === 0) {
                    grid.innerHTML = '<p>No products found.</p>';
                    return;
                }

                grid.innerHTML = products.map(p => `
                    <div class="product-card">
                        <h3>${p.name}</h3>
                        <p>${p.description || 'No description'}</p>
                        <p><strong>$${p.price.toFixed(2)}</strong></p>
                        <p class="category">Category: ${p.category ? p.category.name : 'N/A'}</p>
                    </div>
                `).join('');
            } catch (error) {
                grid.innerHTML = `<p style="color:red;">Failed to load products: ${error.message}</p>`;
                console.error('Fetch error:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchProducts);
    </script>
</body>
</html>
