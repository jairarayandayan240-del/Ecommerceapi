 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Products</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 1000px; margin: auto; }
        .product-card { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 8px; overflow: auto; }
        .product-card img { max-width: 150px; max-height: 150px; float: right; margin-left: 15px; border-radius: 5px; }
        .category { color: #666; font-style: italic; }
        #auth-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f0f0f0; margin-bottom: 20px; }
        button { cursor: pointer; padding: 5px 12px; background: #007bff; color: white; border: none; border-radius: 4px; }
        #logout-btn { background: #dc3545; }
        .error { color: red; }
    </style>
</head>
<body>
    <div id="auth-bar">
        <span id="user-info">Not logged in</span>
        <div>
            <a href="register.html" id="register-link">Register</a>
            <a href="login.html" id="login-link">Login</a>
            <button id="logout-btn" style="display:none;" onclick="logout()">Logout</button>
        </div>
    </div>

    <h1>Product Catalog</h1>
    <div id="product-grid">Loading products...</div>

   <script>
    const PRODUCTS_URL = '/api/v1/products';
const AUTH_URL = '/api/v1/auth/me';
const LOGOUT_URL = '/logout';

    async function checkAuth() {
        try {
            const res = await fetch(AUTH_URL, { credentials: 'include' });
            if (res.ok) {
                const user = await res.json();
                document.getElementById('user-info').textContent = `Logged in as: ${user.username} (${user.role})`;
                document.getElementById('login-link').style.display = 'none';
                document.getElementById('register-link').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'inline';
            } else if (res.status === 401) {
                updateAuthUI(false);
            }
        } catch (e) {
            updateAuthUI(false);
        }
    }

    function updateAuthUI(isLoggedIn) {
        if (!isLoggedIn) {
            document.getElementById('user-info').textContent = 'Not logged in';
            document.getElementById('login-link').style.display = 'inline';
            document.getElementById('register-link').style.display = 'inline';
            document.getElementById('logout-btn').style.display = 'none';
        }
    }

    async function logout() {
        // Call the Spring Security /logout endpoint (POST)
        await fetch('/logout', { method: 'POST', credentials: 'include' });
        // Redirect to the custom login page
        window.location.href = '/login';
    }

    async function fetchProducts() {
        const grid = document.getElementById('product-grid');
        try {
            const response = await fetch(PRODUCTS_URL);
            if (!response.ok) throw new Error(`Server error: ${response.status}`);
            const products = await response.json();
            console.log('Fetched products:', products);

            if (products.length === 0) {
                grid.innerHTML = '<p>No products found.</p>';
                return;
            }

            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    ${p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.name}" style="max-width:150px;">` : ''}
                    <h3>${p.name}</h3>
                    <p>${p.description || 'No description'}</p>
                    <p><strong>$${p.price.toFixed(2)}</strong></p>
                    <p class="category">Category: ${p.category ? p.category.name : 'N/A'}</p>
                </div>
            `).join('');
        } catch (error) {
            grid.innerHTML = `<p class="error">Failed to load products: ${error.message}</p>`;
            console.error('Fetch error:', error);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        checkAuth();
        fetchProducts();
    });
</script>
</body>
</html>
