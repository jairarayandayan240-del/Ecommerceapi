 <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin – Add Product</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        input, textarea { width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>Admin Panel – Add New Product</h2>

    <div th:if="${success}" class="success" th:text="${success}"></div>
    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form th:action="@{/admin/products}" method="post" th:object="${productDto}">
        <!-- CSRF token automatically inserted -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <label>Name:</label>
        <input type="text" th:field="*{name}" required />

        <label>Description:</label>
        <textarea th:field="*{description}" rows="3"></textarea>

        <label>Price:</label>
        <input type="number" step="0.01" th:field="*{price}" required />

        <label>Category Name:</label>
        <input type="text" th:field="*{categoryName}" required />

        <label>Stock Quantity:</label>
        <input type="number" th:field="*{stockQuantity}" required />

        <label>Image URL:</label>
        <input type="text" th:field="*{imageUrl}" />

        <button type="submit">Create Product</button>
    </form>

    <p><a th:href="@{/index.html}">Back to Catalog</a></p>
</body>
</html>
